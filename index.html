<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SNU Class Checker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" data-partials="partials/main.html,partials/trend.html,partials/grad.html,partials/legal.html"></div>
  <script>
    // Cache-bust JS so redeploys take effect immediately (GitHub Pages caches these otherwise).
    (function () {
      var v = Date.now();
      ["config.js", "loader.js"].forEach(function (src) {
        var s = document.createElement("script");
        s.src = src + "?v=" + v;
        s.async = false;   // preserve execution order: config.js before loader.js
        document.head.appendChild(s);
      });
    })();
  </script>
</body>
</html>
